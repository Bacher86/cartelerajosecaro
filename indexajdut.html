<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visor Horizontal Adaptable - Ajdut Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; background-color: #050c14; color: #ffffff; 
            font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; 
            display: flex; flex-direction: column; 
        }

        header { 
            height: 12vh; background: #0a192f; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 40px; border-bottom: 2px solid #3b82f6; box-sizing: border-box;
            flex-shrink: 0; z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .logo-ajdut { height: 8vh; width: auto; object-fit: contain; }

        .fechas-container { flex: 1; text-align: center; display: flex; flex-direction: column; gap: 5px; }
        #fecha-greg { font-size: 1.4rem; color: #3b82f6; font-weight: 700; text-transform: capitalize; }
        #fecha-heb { font-size: 1.1rem; color: #a0aec0; font-weight: 400; }

        #reloj { font-size: 3.5rem; font-weight: 200; text-align: right; min-width: 150px; color: #ffffff; }

        /* DISTRIBUCIÓN HORIZONTAL */
        .contenido-horizontal {
            flex: 1; display: flex; flex-direction: row; 
            padding: 20px; box-sizing: border-box; gap: 20px;
            overflow: hidden; transition: all 0.5s ease;
        }

        /* Columna Izquierda: Foto / Video (60% de ancho) */
        .marco-foto {
            flex: 1.5; height: 100%; display: flex; align-items: center; justify-content: center;
            /* Fondo oscuro para rellenar si la imagen no coincide en proporción */
            background-color: #03080f; 
            border-radius: 20px; overflow: hidden; position: relative;
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        /* CORRECCIÓN AQUÍ: object-fit: contain asegura que se vea TODA la imagen */
        #foto-principal { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            background-color: #03080f; /* Refuerzo de fondo */
        }

        /* Columna Derecha: Texto Rotativo (40% de ancho) */
        .caja-mensajes {
            flex: 1; display: flex; align-items: center; justify-content: center;
            text-align: center; background: linear-gradient(135deg, #0a192f 0%, #0d2547 100%); 
            border-radius: 20px; padding: 40px; box-sizing: border-box;
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        #mensaje-texto { font-size: 2.6rem; font-weight: 800; color: #ffffff; line-height: 1.3; }

        footer { 
            height: 8vh; background: #0d2547; display: flex; align-items: center; 
            overflow: hidden; flex-shrink: 0; border-top: 2px solid #3b82f6;
        }
        .marquee { font-size: 2.2rem; font-weight: bold; color: #3b82f6; white-space: nowrap; animation: scroll 25s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        /* MODO VIDEO */
        .modo-video .caja-mensajes, 
        .modo-video footer { display: none !important; }
        .modo-video .marco-foto { flex: 1; height: 88vh; border-radius: 0; background: black; border: none; }
        .modo-video .contenido-horizontal { padding: 0; }
    </style>
</head>
<body>

    <header>
        <img src="Adjut.png" class="logo-ajdut" alt="Logo">
        <div class="fechas-container">
            <div id="fecha-greg">Cargando fecha...</div>
            <div id="fecha-heb">Cargando fecha hebrea...</div>
        </div>
        <div id="reloj">00:00</div>
    </header>

    <div class="contenido-horizontal" id="main-container">
        <div class="marco-foto" id="media-box">
            <img id="foto-principal" src="" style="display:none;">
            <div id="contenedor-youtube" style="display:none; width:100%; height:100%;">
                <div id="player-yt"></div>
            </div>
        </div>
        <div class="caja-mensajes">
            <div id="mensaje-texto">Cargando anuncios...</div>
        </div>
    </div>

    <footer>
        <div class="marquee" id="texto-zocalo">Cargando noticias de la comunidad...</div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzBO8TzuGeAV-_nsGDgIWckWhV_vkOhTY",
            authDomain: "cartelera-nube.firebaseapp.com",
            databaseURL: "https://cartelera-nube-default-rtdb.firebaseio.com",
            projectId: "cartelera-nube",
            storageBucket: "cartelera-nube.firebasestorage.app",
            messagingSenderId: "333887658907",
            appId: "1:333887658907:web:c9d3904ad02a8fd9fe1f3e"
        };

        let data = { fotos: [], texto: [], zocalo: "" };
        let idxF = -1; let idxT = 0;
        let player = null;
        let rotacionInterval = null;
        let youtubeReady = false;
        let seguroVideo = null;
        const TIEMPO_FOTO = 10000;

        function onYouTubeIframeAPIReady() { youtubeReady = true; }

        function actualizarReloj() {
            const ahora = new Date();
            document.getElementById('reloj').innerText = ahora.getHours().toString().padStart(2, '0') + ":" + ahora.getMinutes().toString().padStart(2, '0');
            document.getElementById('fecha-greg').innerText = ahora.toLocaleDateString('es-AR', {weekday: 'long', day: 'numeric', month: 'long'});
            fetch('https://www.hebcal.com/converter?cfg=json&gy='+ahora.getFullYear()+'&gm='+(ahora.getMonth()+1)+'&gd='+ahora.getDate()+'&g2h=1')
                .then(res => res.json()).then(d => {
                    document.getElementById('fecha-heb').innerText = d.hd + " de " + d.hm + ", " + d.hy;
                }).catch(() => {});
        }

        function rotar() {
            if (!data.fotos || data.fotos.length === 0) {
                document.getElementById('mensaje-texto').innerText = (data.texto && data.texto.length > 0) ? data.texto[0] : "Ajdut";
                return;
            }
            idxF = (idxF + 1) % data.fotos.length;
            const item = data.fotos[idxF];
            const img = document.getElementById('foto-principal');
            const ytContainer = document.getElementById('contenedor-youtube');
            const esVideo = item.url && (item.url.includes('youtube.com') || item.url.includes('youtu.be') || item.formato === 'video');

            if (esVideo) {
                if(!youtubeReady) { setTimeout(rotar, 2000); return; }
                clearInterval(rotacionInterval); rotacionInterval = null;
                document.body.classList.add('modo-video');
                let videoId = "";
                if (item.url.includes('v=')) { videoId = item.url.split('v=')[1].split('&')[0]; }
                else if (item.url.includes('/shorts/')) { videoId = item.url.split('/shorts/')[1].split('?')[0]; }
                else { videoId = item.url.split('/').pop().split('?')[0]; }
                img.style.display = 'none'; ytContainer.style.display = 'block';
                if (!player) {
                    player = new YT.Player('player-yt', {
                        height: '100%', width: '100%', videoId: videoId,
                        playerVars: { 'autoplay': 1, 'mute': 1, 'controls': 0, 'modestbranding': 1, 'rel': 0 },
                        events: { 'onStateChange': onPlayerStateChange, 'onReady': (e) => { e.target.playVideo(); programarSeguro(e.target.getDuration()); }, 'onError': () => { rotar(); } }
                    });
                } else { player.loadVideoById({ videoId: videoId }); player.mute(); player.playVideo(); setTimeout(() => programarSeguro(player.getDuration()), 2000); }
            } else {
                document.body.classList.remove('modo-video');
                ytContainer.style.display = 'none';
                if(player && player.stopVideo) player.stopVideo();
                clearTimeout(seguroVideo);
                img.src = item.url;
                img.style.display = 'block';
                if (data.texto && data.texto.length > 0) { idxT = (idxT + 1) % data.texto.length; document.getElementById('mensaje-texto').innerText = data.texto[idxT]; }
                if(!rotacionInterval) restartInterval();
            }
        }

        function programarSeguro(duracion) { clearTimeout(seguroVideo); if(duracion > 0) { seguroVideo = setTimeout(() => { rotar(); restartInterval(); }, (duracion + 5) * 1000); } }
        function onPlayerStateChange(event) { if (event.data === YT.PlayerState.ENDED) { clearTimeout(seguroVideo); rotar(); restartInterval(); } }
        function restartInterval() { clearInterval(rotacionInterval); rotacionInterval = setInterval(rotar, TIEMPO_FOTO); }

        window.addEventListener('load', () => {
            actualizarReloj(); setInterval(actualizarReloj, 1000);
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            firebase.database().ref('cartelera/ajdut').on('value', snap => {
                const val = snap.val();
                if(val) { data = val; document.getElementById('texto-zocalo').innerText = data.zocalo || "Comunidad Ajdut"; if(!rotacionInterval) { rotar(); restartInterval(); } }
            });
        });

        setInterval(() => { if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{}); }, 30000);
        const ahora = new Date(); const noche = new Date(ahora.getFullYear(), ahora.getMonth(), ahora.getDate(), 3, 0, 0);
        let tiempoRestante = noche.getTime() - ahora.getTime(); if (tiempoRestante < 0) tiempoRestante += 86400000;
        setTimeout(() => { location.reload(); }, tiempoRestante);
    </script>
</body>
</html>
