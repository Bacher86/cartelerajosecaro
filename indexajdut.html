<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Vertical - Ajdut</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
    body { 
        margin: 0; background-color: #2e314f; color: white; 
        font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; 
        display: flex; flex-direction: column; 
    }

   header { 
    height: 12vh; 
    background: rgba(0,0,0,0.5); 
    display: flex; 
    flex-direction: column; /* Apila el logo sobre el reloj */
    align-items: center; 
    justify-content: center;
    border-bottom: 2px solid #d4af37;
    padding: 10px 0;
}

.logo-ajdut { 
    max-height: 6vh; /* Ajusta el tamaño para que no tape todo */
    width: auto; 
    object-fit: contain;
    margin-bottom: 5px;
}

#reloj { 
    font-size: 2.5rem; 
    font-weight: 200; 
    line-height: 1;
}

    .contenido-vertical {
        height: 82vh; /* Altura controlada para que no empuje al footer */
        display: flex; flex-direction: column; 
        padding: 15px; box-sizing: border-box;
        gap: 15px;
    }

    .marco-foto {
        flex: 2; width: 100%; display: flex; align-items: center; justify-content: center;
        background: rgba(0,0,0,0.2); border-radius: 20px; overflow: hidden;
    }

    #foto-principal { 
        max-width: 100%; max-height: 100%; 
        object-fit: contain; /* Esto evita que la imagen se deforme o se agrande de más */
    }

    .caja-mensajes {
        flex: 1; display: flex; align-items: center; justify-content: center;
        text-align: center; background: rgba(255,255,255,0.05); border-radius: 20px;
        padding: 20px;
    }

    #mensaje-texto {
        font-size: 2.5rem; font-weight: 800; color: #f5d76e; line-height: 1.2;
        transition: opacity 0.8s ease;
    }

    footer { 
        height: 8vh; /* 8% de la altura fijo abajo */
        background: #5d1a1a; display: flex; align-items: center; 
        overflow: hidden; width: 100%;
    }

    .marquee { 
        font-size: 2rem; font-weight: bold; white-space: nowrap; 
        animation: scroll 15s linear infinite; padding-left: 100%; 
    }

    @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-200%); } }
</style>
</head>
<body>

   <header>
    <img src="LogoAdjut.png" class="logo-ajdut" alt="Logo Ajdut">
    <div id="reloj">00:00</div>
</header>

    <div class="contenido-vertical">
        <div class="marco-foto">
            <img id="foto-principal" src="">
        </div>
        <div class="caja-mensajes">
            <div id="mensaje-texto">Cargando...</div>
        </div>
    </div>

    <footer>
        <div class="marquee" id="texto-zocalo">Cargando noticias...</div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        // Tu configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAzBO8TzuGeAV-_nsGDgIWckWhV_vkOhTY",
            authDomain: "cartelera-nube.firebaseapp.com",
            databaseURL: "https://cartelera-nube-default-rtdb.firebaseio.com",
            projectId: "cartelera-nube",
            storageBucket: "cartelera-nube.firebasestorage.app",
            messagingSenderId: "333887658907",
            appId: "1:333887658907:web:c9d3904ad02a8fd9fe1f3e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const dbRef = db.ref('cartelera/ajdut');

        let data = { fotos: [], texto: [], zocalo: "" };
        let idxF = 0; let idxT = 0;

        function actualizarReloj() {
            const ahora = new Date();
            document.getElementById('reloj').innerText = ahora.getHours().toString().padStart(2, '0') + ":" + ahora.getMinutes().toString().padStart(2, '0');
        }

        dbRef.on('value', snap => {
            const val = snap.val();
            if(val) {
                data = val;
                document.getElementById('texto-zocalo').innerText = data.zocalo || "Comunidad Ajdut";
            }
        });

        function rotar() {
            if (data.fotos && data.fotos.length > 0) {
                idxF = (idxF + 1) % data.fotos.length;
                document.getElementById('foto-principal').src = data.fotos[idxF].url;
            }
            if (data.texto && data.texto.length > 0) {
                const msgEl = document.getElementById('mensaje-texto');
                msgEl.style.opacity = 0;
                setTimeout(() => {
                    idxT = (idxT + 1) % data.texto.length;
                    msgEl.innerText = data.texto[idxT];
                    msgEl.style.opacity = 1;
                }, 800);
            }
        }

        setInterval(actualizarReloj, 1000);
        setInterval(rotar, 10000); // Cambia cada 10 segundos para no cansar la tele
        actualizarReloj();
    </script>
</body>
</html>
