<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Vertical - Ajdut</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; background-color: #2e314f; color: white; 
            font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; 
            display: flex; flex-direction: column; 
        }

        header { 
            height: 12vh; 
            background: rgba(0,0,0,0.5); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 40px; 
            border-bottom: 2px solid #d4af37;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .logo-container { width: 25%; display: flex; align-items: center; }
        .logo-ajdut { height: 8vh; width: auto; object-fit: contain; }

        .fechas-container { flex: 1; text-align: center; }
        #fecha-greg { font-size: 1.6rem; color: #d4af37; font-weight: 700; text-transform: capitalize; }

        #reloj { font-size: 3.5rem; font-weight: 200; width: 25%; text-align: right; }

        .contenido-vertical {
            height: 80vh; 
            display: flex; flex-direction: column; 
            padding: 20px; box-sizing: border-box;
            gap: 20px;
            flex-grow: 1;
        }

        .marco-foto {
            flex: 2; width: 100%; display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.2); border-radius: 20px; overflow: hidden;
        }

        #foto-principal { max-width: 100%; max-height: 100%; object-fit: contain; }

        .caja-mensajes {
            flex: 1; display: flex; align-items: center; justify-content: center;
            text-align: center; background: rgba(255,255,255,0.05); border-radius: 20px;
            padding: 30px; border: 1px solid rgba(212, 175, 55, 0.2);
        }

        #mensaje-texto {
            font-size: 3rem; font-weight: 800; color: #f5d76e; line-height: 1.2;
            transition: opacity 0.8s ease;
        }

        footer { 
            height: 8vh; 
            background: #5d1a1a; 
            display: flex; align-items: center; 
            overflow: hidden; width: 100%;
            flex-shrink: 0; /* EVITA QUE EL ZÓCALO DESAPAREZCA */
        }

        .marquee { 
            font-size: 2.2rem; font-weight: bold; white-space: nowrap; 
            display: inline-block;
            animation: scroll 20s linear infinite;
        }

        @keyframes scroll { 
            0% { transform: translateX(100vw); } 
            100% { transform: translateX(-100%); } 
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="LogoAdjut.png" class="logo-ajdut" alt="Logo">
        </div>
        <div class="fechas-container">
    <div id="fecha-greg">Cargando fecha...</div>
    <div id="fecha-heb" style="font-size: 1.1rem; color: #ffffff; margin-top: 5px;"></div>
</div>
        <div id="reloj">00:00</div>
    </header>

    <div class="contenido-vertical">
        <div class="marco-foto">
            <img id="foto-principal" src="">
        </div>
        <div class="caja-mensajes">
            <div id="mensaje-texto">Cargando anuncios...</div>
        </div>
    </div>

    <footer>
        <div class="marquee" id="texto-zocalo">Cargando noticias de la comunidad...</div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzBO8TzuGeAV-_nsGDgIWckWhV_vkOhTY",
            authDomain: "cartelera-nube.firebaseapp.com",
            databaseURL: "https://cartelera-nube-default-rtdb.firebaseio.com",
            projectId: "cartelera-nube",
            storageBucket: "cartelera-nube.firebasestorage.app",
            messagingSenderId: "333887658907",
            appId: "1:333887658907:web:c9d3904ad02a8fd9fe1f3e"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const dbRef = db.ref('cartelera/ajdut');

        let data = { fotos: [], texto: [], zocalo: "" };
        let idxF = 0; 
        let idxT = 0;

       function actualizarReloj() {
    const ahora = new Date();
    // Hora
    document.getElementById('reloj').innerText = ahora.getHours().toString().padStart(2, '0') + ":" + ahora.getMinutes().toString().padStart(2, '0');
    
    // Fecha Gregoriana
    const opciones = { weekday: 'long', day: 'numeric', month: 'long' };
    document.getElementById('fecha-greg').innerText = ahora.toLocaleDateString('es-AR', opciones);

    // Fecha Hebrea (Llamada a API)
    fetch('https://www.hebcal.com/converter?cfg=json&gy=' + ahora.getFullYear() + '&gm=' + (ahora.getMonth() + 1) + '&gd=' + ahora.getDate() + '&g2h=1')
        .then(response => response.json())
        .then(data => {
            // Esto arma la fecha en español: "18 de Nisán, 5784"
            const fechaHebrea = data.hd + " de " + data.hm + ", " + data.hy;
            document.getElementById('fecha-heb').innerText = fechaHebrea;
        })
        .catch(err => console.log("Error fecha hebrea:", err));
}

        dbRef.on('value', snap => {
            const val = snap.val();
            if(val) {
                data = val;
                if (data.zocalo) {
                    document.getElementById('texto-zocalo').innerText = data.zocalo;
                }
            }
        });

        function rotar() {
            if (data.fotos && data.fotos.length > 0) {
                idxF = (idxF + 1) % data.fotos.length;
                document.getElementById('foto-principal').src = data.fotos[idxF].url;
            }
            if (data.texto && data.texto.length > 0) {
                const msgEl = document.getElementById('mensaje-texto');
                msgEl.style.opacity = 0;
                setTimeout(() => {
                    idxT = (idxT + 1) % data.texto.length;
                    msgEl.innerText = data.texto[idxT];
                    msgEl.style.opacity = 1;
                }, 800);
            }
        }

        setInterval(actualizarReloj, 1000);
        setInterval(rotar, 10000);
        actualizarReloj();
    </script>
</body>
</html>
