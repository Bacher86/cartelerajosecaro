<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cartelera Primaria - Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; background-color: #1a1c2c; color: white; 
            font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; 
            display: flex; flex-direction: column; 
        }

        header { 
            height: 15vh; background: rgba(0,0,0,0.6); 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 50px; border-bottom: 3px solid #d4af37; box-sizing: border-box;
            flex-shrink: 0; z-index: 10;
        }

        .logo { height: 10vh; width: auto; }
        .fechas-container { text-align: center; flex: 1; }
        #fecha-greg { font-size: 1.8rem; color: #d4af37; font-weight: 700; text-transform: capitalize; }
        #fecha-heb { font-size: 1.3rem; color: #ffffff; margin-top: 5px; }
        #reloj { font-size: 4.5rem; font-weight: 200; min-width: 200px; text-align: right; }

        .main-content {
            flex: 1; display: flex; padding: 25px; gap: 25px; box-sizing: border-box; align-items: center;
            overflow: hidden; transition: all 0.5s ease;
        }

        .contenedor-foto {
            flex: 1.5; height: 100%; display: flex; align-items: center; justify-content: center;
            background: #1a1c2c; border-radius: 20px; overflow: hidden;
        }
        #foto-principal { max-width: 100%; max-height: 100%; object-fit: contain; }

        .contenedor-texto {
            flex: 1; height: 100%; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border-radius: 20px; padding: 30px; text-align: center;
        }
        #mensaje-texto { font-size: 3.2rem; font-weight: 900; color: #f5d76e; line-height: 1.1; }

        footer { 
            height: 10vh; background: #5d1a1a; display: flex; align-items: center; 
            overflow: hidden; border-top: 2px solid #d4af37; flex-shrink: 0;
        }
        .marquee { 
            font-size: 2.5rem; font-weight: bold; white-space: nowrap; 
            display: inline-block; animation: scroll 25s linear infinite; 
        }
        @keyframes scroll { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        /* MODO VIDEO */
        .modo-video .contenedor-texto, 
        .modo-video footer { display: none !important; }
        .modo-video .contenedor-foto { flex: 1; width: 100vw; height: 85vh; border-radius: 0; }
        .modo-video .main-content { padding: 0; }
    </style>
</head>
<body>

    <header>
        <img src="logo.png.png" class="logo" alt="Logo">
        <div class="fechas-container">
            <div id="fecha-greg">Cargando fecha...</div>
            <div id="fecha-heb">Cargando fecha hebrea...</div>
        </div>
        <div id="reloj">00:00</div>
    </header>

    <div class="main-content" id="main-container">
        <div class="contenedor-foto" id="media-box">
            <img id="foto-principal" src="" style="display:none;">
            <div id="contenedor-youtube" style="display:none; width:100%; height:100%;">
                <div id="player-yt"></div>
            </div>
        </div>
        <div class="contenedor-texto">
            <div id="mensaje-texto">Cargando anuncios...</div>
        </div>
    </div>

    <footer>
        <div class="marquee" id="texto-zocalo">Cargando noticias de Primaria...</div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzBO8TzuGeAV-_nsGDgIWckWhV_vkOhTY",
            authDomain: "cartelera-nube.firebaseapp.com",
            databaseURL: "https://cartelera-nube-default-rtdb.firebaseio.com",
            projectId: "cartelera-nube",
            storageBucket: "cartelera-nube.firebasestorage.app",
            messagingSenderId: "333887658907",
            appId: "1:333887658907:web:c9d3904ad02a8fd9fe1f3e"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const dbRef = firebase.database().ref('cartelera/primaria');

        let data = { fotos: [], texto: [], zocalo: "" };
        let idxF = -1; 
        let idxT = 0;
        let player;
        let rotacionInterval;
        const TIEMPO_FOTO = 10000; 

        function onYouTubeIframeAPIReady() {
            iniciarCartelera();
        }

        function iniciarCartelera() {
            actualizarReloj();
            setInterval(actualizarReloj, 1000);
            
            dbRef.on('value', snap => {
                const val = snap.val();
                if(val) {
                    data = val;
                    if(data.zocalo) document.getElementById('texto-zocalo').innerText = data.zocalo;
                    if(!rotacionInterval) restartInterval();
                }
            });
        }

        function actualizarReloj() {
            const ahora = new Date();
            document.getElementById('reloj').innerText = ahora.getHours().toString().padStart(2, '0') + ":" + ahora.getMinutes().toString().padStart(2, '0');
            document.getElementById('fecha-greg').innerText = ahora.toLocaleDateString('es-AR', {weekday: 'long', day: 'numeric', month: 'long'});
            
            fetch('https://www.hebcal.com/converter?cfg=json&gy='+ahora.getFullYear()+'&gm='+(ahora.getMonth()+1)+'&gd='+ahora.getDate()+'&g2h=1')
                .then(res => res.json()).then(d => {
                    document.getElementById('fecha-heb').innerText = d.hd + " de " + d.hm + ", " + d.hy;
                }).catch(e => console.log("Error Hebcal"));
        }

        function rotar() {
            if (!data.fotos || data.fotos.length === 0) return;

            idxF = (idxF + 1) % data.fotos.length;
            const item = data.fotos[idxF];
            const img = document.getElementById('foto-principal');
            const ytContainer = document.getElementById('contenedor-youtube');

            if (item.url.includes('youtube.com') || item.url.includes('youtu.be')) {
                clearInterval(rotacionInterval);
                document.body.classList.add('modo-video');
                
                let videoId = item.url.split('v=')[1] || item.url.split('/').pop();
                if(videoId.includes('&')) videoId = videoId.split('&')[0];

                img.style.display = 'none';
                ytContainer.style.display = 'block';

                if (!player) {
                    player = new YT.Player('player-yt', {
                        height: '100%', width: '100%', videoId: videoId,
                        playerVars: { 'autoplay': 1, 'mute': 1, 'controls': 0, 'modestbranding': 1 },
                        events: { 'onStateChange': onPlayerStateChange }
                    });
                } else {
                    player.loadVideoById({ videoId: videoId });
                    player.mute();
                    player.playVideo();
                }
            } else {
                document.body.classList.remove('modo-video');
                ytContainer.style.display = 'none';
                if(player) player.stopVideo();
                
                img.src = item.url;
                img.style.display = 'block';

                if (data.texto && data.texto.length > 0) {
                    idxT = (idxT + 1) % data.texto.length;
                    document.getElementById('mensaje-texto').innerText = data.texto[idxT];
                }
                // Si volvimos de un video, aseguramos que el intervalo corra
                if(!rotacionInterval) restartInterval();
            }
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.ENDED) {
                restartInterval();
                rotar();
            }
        }

        function restartInterval() {
            clearInterval(rotacionInterval);
            rotacionInterval = setInterval(rotar, TIEMPO_FOTO);
        }

        // --- ANTI-SUEÑO TCL ---
        setInterval(() => {
            window.scrollBy(0, 1);
            window.scrollBy(0, -1);
            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').catch(() => {});
            }
        }, 30000);

        // --- REFREZCO 3 AM ---
        function programarRefresco() {
            const ahora = new Date();
            const noche = new Date(ahora.getFullYear(), ahora.getMonth(), ahora.getDate(), 3, 0, 0);
            let tiempo = noche.getTime() - ahora.getTime();
            if (tiempo < 0) tiempo += 86400000;
            setTimeout(() => location.reload(), tiempo);
        }
        programarRefresco();
    </script>
</body>
</html>
