<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Central Escolar - Modo Edición</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #eef2f3; color: #333; }
        .panel { background: white; padding: 30px; border-radius: 15px; max-width: 700px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #2e314f; border-bottom: 3px solid #d4af37; padding-bottom: 10px; margin-top: 0; }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; color: #2e314f; }
        input, select, button, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        
        .sedes-container { background: #fdf2d5; border: 1px solid #d4af37; padding: 15px; border-radius: 8px; display: flex; justify-content: space-around; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .sede-option { cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .sede-option input { width: auto; margin: 0; }
        
        .sede-ajdut { color: #e67e22; border: 1px solid #e67e22; padding: 5px 10px; border-radius: 5px; background: #fffaf5; }

        #btnSubir { background: #2e314f; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; padding: 15px; }
        #btnSubir.modo-edit { background: #27ae60; } 
        #btnSubir:hover { opacity: 0.9; }

        #horarios { background: #f0f4f8; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px dashed #2e314f; display: none; }
        .dias-selector { display: flex; justify-content: space-between; margin-top: 10px; }
        .dias-selector label { font-size: 0.8rem; text-align: center; font-weight: normal; }
        .dias-selector input { width: auto; display: block; margin: 5px auto 0; }

        .historial-container { margin-top:30px; border-top:2px solid #eee; padding-top:20px; }
        .historial-item { background: #f9f9f9; padding: 12px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #2e314f; display: flex; justify-content: space-between; align-items: center; }
        .btn-editar { background: #3498db; width: auto; padding: 5px 12px; font-size: 0.8rem; margin: 0; color: white; border: none; border-radius: 4px; cursor: pointer;}
        .btn-borrar { background: #e74c3c; width: auto; padding: 5px 12px; font-size: 0.8rem; margin: 0; color: white; border: none; border-radius: 4px; cursor: pointer;}
    </style>
</head>
<body>

<div class="panel">
    <h2 id="titulo-panel">🚀 Panel de Control Escolar</h2>
    
    <label>🏢 EDIFICIOS DESTINO:</label>
    <div class="sedes-container">
        <label class="sede-option"><input type="checkbox" class="sede-check" value="primaria"> Primaria</label>
        <label class="sede-option"><input type="checkbox" class="sede-check" value="kheila-gan"> Gan</label>
        <label class="sede-option"><input type="checkbox" class="sede-check" value="secundaria"> Secundaria</label>
        <label class="sede-option sede-ajdut"><input type="checkbox" class="sede-check" value="ajdut"> 📱 Ajdut (Vertical)</label>
    </div>

    <label>TIPO DE PUBLICACIÓN:</label>
    <select id="tipo">
        <option value="texto">📝 Mensaje Central (Rotativo)</option>
        <option value="foto">🖼️ Foto (Formato Normal)</option>
        <option value="foto-completa">📺 Foto (Pantalla Completa)</option>
        <option value="video-yt">🎬 Video de YouTube</option>
        <option value="zocalo">🎞️ Noticia Zócalo (Abajo)</option>
        <option value="evento">⚠️ MENSAJE IMPORTANTE (Bloqueo)</option>
    </select>

    <textarea id="contenido" placeholder="Escribe el mensaje o pega el link aquí..." rows="4"></textarea>

    <div id="horarios">
        <label>VIGENCIA Y HORARIOS:</label>
        <div style="display: flex; gap: 10px;">
            <input type="date" id="fecha-inicio">
            <input type="date" id="fecha-fin">
        </div>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <input type="time" id="inicio" value="08:00"> 
            <input type="time" id="fin" value="16:00">
        </div>
        <div class="dias-selector">
            <label>L <input type="checkbox" class="dia-check" value="1" checked></label>
            <label>M <input type="checkbox" class="dia-check" value="2" checked></label>
            <label>M <input type="checkbox" class="dia-check" value="3" checked></label>
            <label>J <input type="checkbox" class="dia-check" value="4" checked></label>
            <label>V <input type="checkbox" class="dia-check" value="5" checked></label>
            <label>S <input type="checkbox" class="dia-check" value="6"></label>
            <label>D <input type="checkbox" class="dia-check" value="0"></label>
        </div>
    </div>

    <button id="btnSubir">🚀 PUBLICAR AHORA</button>

    <div class="historial-container">
        <label>VER Y EDITAR HISTORIAL DE:</label>
        <select id="ver-historial-sede" onchange="cargarHistorial()">
            <option value="primaria">Primaria</option>
            <option value="kheila-gan">Kheila/Gan</option>
            <option value="secundaria">Secundaria</option>
            <option value="ajdut">Ajdut (Vertical)</option>
        </select>
        <div id="historial">Cargando...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAzBO8TzuGeAV-_nsGDgIWckWhV_vkOhTY",
        authDomain: "cartelera-nube.firebaseapp.com",
        databaseURL: "https://cartelera-nube-default-rtdb.firebaseio.com",
        projectId: "cartelera-nube",
        storageBucket: "cartelera-nube.firebasestorage.app",
        messagingSenderId: "333887658907",
        appId: "1:333887658907:web:c9d3904ad02a8fd9fe1f3e"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const btnSubir = document.getElementById('btnSubir');

    document.getElementById('tipo').onchange = function() {
        document.getElementById('horarios').style.display = (this.value === 'evento') ? 'block' : 'none';
        if(this.value === 'video-yt') {
            document.getElementById('contenido').placeholder = "Pega el link de YT aquí (ej: https://www.youtube.com/watch?v=...)";
        } else {
            document.getElementById('contenido').placeholder = "Escribe el mensaje o pega el link aquí...";
        }
    };

   btnSubir.onclick = function() {
        const sedes = Array.from(document.querySelectorAll('.sede-check:checked')).map(cb => cb.value);
        if (sedes.length === 0) return alert("Selecciona al menos una sede.");
        
        const tipo = document.getElementById('tipo').value;
        let cont = document.getElementById('contenido').value;

        // --- CORRECCIÓN PARA SHORTS ---
        if (tipo === 'video-yt' && cont.includes('/shorts/')) {
            cont = cont.replace('/shorts/', '/watch?v=');
        }
        // ------------------------------

        sedes.forEach(sede => {
            const refSede = db.ref('cartelera/' + sede);
            refSede.once('value').then(snap => {
                let data = snap.val() || { texto: [], fotos: [], zocalo: "", eventos: [] };
                
                if (tipo === 'texto') { 
                    if(!data.texto) data.texto=[]; 
                    data.texto.push(cont); 
                }
                else if (tipo === 'foto') { 
                    if(!data.fotos) data.fotos=[]; 
                    data.fotos.push({url: cont, formato: 'normal'}); 
                }
                else if (tipo === 'foto-completa') { 
                    if(!data.fotos) data.fotos=[]; 
                    data.fotos.push({url: cont, formato: 'completa'}); 
                }
                else if (tipo === 'video-yt') { 
                    if(!data.fotos) data.fotos=[]; 
                    data.fotos.push({url: cont, formato: 'video'}); 
                }
                else if (tipo === 'zocalo') {
                    data.zocalo = cont;
                }
                else if (tipo === 'evento') {
                    if(!data.eventos) data.eventos = [];
                    const dias = Array.from(document.querySelectorAll('.dia-check:checked')).map(cb => parseInt(cb.value));
                    data.eventos.push({
                        msg: cont, inicio: document.getElementById('inicio').value, fin: document.getElementById('fin').value,
                        dias: dias, fechaInicio: document.getElementById('fecha-inicio').value || null, fechaFin: document.getElementById('fecha-fin').value || null
                    });
                }
                return refSede.set(data);
            });
        });
        
        btnSubir.innerText = "🚀 PUBLICAR AHORA";
        btnSubir.classList.remove('modo-edit');
        document.getElementById('contenido').value = "";
        alert("¡Publicado con éxito!");
    };

    function cargarHistorial() {
        const sede = document.getElementById('ver-historial-sede').value;
        db.ref('cartelera/' + sede).on('value', snap => {
            const h = document.getElementById('historial');
            const data = snap.val();
            h.innerHTML = "";
            if(!data) { h.innerHTML = "Sede vacía."; return; }

            if(data.texto) data.texto.forEach((t, i) => h.innerHTML += itemHTML(`📝 ${t.substring(0,25)}...`, 'texto', i));
            
            if(data.fotos) data.fotos.forEach((f, i) => {
                const icono = f.formato === 'video' ? '🎬' : '🖼️';
                const nombre = f.formato === 'video' ? 'Video YouTube' : (f.formato === 'completa' ? 'Foto Completa' : 'Foto Normal');
                h.innerHTML += itemHTML(`${icono} ${nombre} ${i+1}`, 'fotos', i);
            });

            if(data.eventos) data.eventos.forEach((e, i) => h.innerHTML += itemHTML(`⚠️ BLOQUEO: ${e.msg.substring(0,15)}...`, 'eventos', i));
            
            if(data.zocalo) h.innerHTML += itemHTML(`🎞️ Zócalo: ${data.zocalo.substring(0,20)}...`, 'zocalo', 0);
        });
    }

    function itemHTML(t, cat, i) {
        return `<div class="historial-item"><span>${t}</span><div class="acciones">
            <button class="btn-editar" onclick="editar('${cat}', ${i})">✏️ Editar</button>
            <button class="btn-borrar" onclick="borrar('${cat}', ${i})">Eliminar</button>
        </div></div>`;
    }

    window.editar = function(cat, i) {
        const sede = document.getElementById('ver-historial-sede').value;
        db.ref('cartelera/' + sede).once('value').then(snap => {
            const data = snap.val();
            const item = (cat === 'zocalo') ? data.zocalo : data[cat][i];

            document.getElementById('contenido').value = (cat === 'fotos') ? item.url : (cat === 'eventos' ? item.msg : item);
            const sel = document.getElementById('tipo');
            
            if (cat === 'texto') sel.value = 'texto';
            else if (cat === 'zocalo') sel.value = 'zocalo';
            else if (cat === 'fotos') {
                if (item.formato === 'video') sel.value = 'video-yt';
                else if (item.formato === 'completa') sel.value = 'foto-completa';
                else sel.value = 'foto';
            }
            else if (cat === 'eventos') {
                sel.value = 'evento';
                document.getElementById('horarios').style.display = 'block';
                document.getElementById('inicio').value = item.inicio;
                document.getElementById('fin').value = item.fin;
                document.getElementById('fecha-inicio').value = item.fechaInicio || "";
                document.getElementById('fecha-fin').value = item.fechaFin || "";
                document.querySelectorAll('.dia-check').forEach(cb => cb.checked = item.dias.includes(parseInt(cb.value)));
            }
            
            document.querySelectorAll('.sede-check').forEach(cb => cb.checked = (cb.value === sede));
            
            btnSubir.innerText = "💾 GUARDAR CAMBIOS";
            btnSubir.classList.add('modo-edit');
            
            borrar(cat, i);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    }

    window.borrar = function(cat, i) {
        const sede = document.getElementById('ver-historial-sede').value;
        const ref = db.ref('cartelera/' + sede);
        ref.once('value').then(snap => {
            let data = snap.val();
            if(!data) return;
            if(cat === 'zocalo') data.zocalo = ""; 
            else if(data[cat]) data[cat].splice(i, 1);
            ref.set(data);
        });
    };

    cargarHistorial();
</script>
</body>
</html>
