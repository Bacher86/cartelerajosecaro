<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartelera Digital Institucional</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <header>
        <div class="logo-container">
           <div class="logo-container">
            <img src="logo.png.png" id="logo-institucional" alt="Logo">
            <img src="Adjut.png" id="logo-secundario" style="display: none; height: 80px; margin-left: 20px;">
</div>
        </div>
        <div class="fechas-container">
            <div id="fecha-greg">Cargando fecha...</div>
            <div id="fecha-heb"></div>
        </div>
        <div id="reloj">00:00</div>
    </header>

    <div class="contenedor-dividido">
        <div class="col-texto">
            <div id="escalera-mensajes">
                </div>
        </div>

        <div class="col-fotos">
            <div class="marco-foto">
                <img id="foto-principal" src="" style="display:none;">
            </div>
        </div>
    </div>

    <footer>
        <div class="noticiero">
            <marquee id="texto-zocalo" scrollamount="10">Cargando...</marquee>
        </div>
    </footer>

  <div id="overlay-evento" style="
    display:none; 
    position:fixed; 
    top:0; left:0; width:100%; height:100%; 
    background: rgba(0,0,0,0.85); /* Fondo oscuro pero con profundidad */
    backdrop-filter: blur(10px); /* Desenfoque elegante de lo que hay atrás */
    z-index:9999; 
    justify-content: center; 
    align-items: center; 
    font-family: 'Inter', sans-serif;
">
    <div style="
        background: #ffffff; 
        color: #1a1a1a; 
        width: 70%; 
        padding: 60px; 
        border-radius: 30px; 
        box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        border-top: 15px solid #2e314f; /* Color institucional azul/oscuro */
        text-align: center;
    ">
        <div style="
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-weight: 700; 
            color: #d4af37; /* Dorado */
            margin-bottom: 30px;
            font-size: 1.5rem;
        ">
            Comunicado Importante
        </div>

        <div id="texto-evento-contenido" style="
            font-size: 3.5rem; 
            font-weight: 800; 
            line-height: 1.2; 
            color: #2e314f;
            word-wrap: break-word;
        ">
            </div>

        <div style="margin-top: 40px; border-top: 1px solid #eee; pt: 20px; font-size: 1.2rem; color: #888;">
            Por favor, preste atención a esta información.
        </div>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
